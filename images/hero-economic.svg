<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="400" fill="url(#bg)"/>
  <!-- Ambient gold wash (right) -->
  <ellipse cx="1280" cy="200" rx="420" ry="280" fill="url(#gold)" opacity="0.9"/>
  <!-- Fintech / card hint -->
  <g transform="translate(1080 120) rotate(-8)">
    <rect x="0" y="0" width="200" height="126" rx="14" fill="#0f172a" stroke="rgba(212,175,55,0.35)" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="36" rx="14" fill="rgba(212,175,55,0.12)"/>
    <rect x="16" y="52" width="120" height="10" rx="3" fill="#334155"/>
    <rect x="16" y="72" width="90" height="8" rx="2" fill="#1e293b"/>
    <circle cx="168" cy="88" r="18" fill="rgba(212,175,55,0.2)" stroke="rgba(212,175,55,0.45)" stroke-width="1"/>
  </g>
  <!-- Earbuds -->
  <g transform="translate(920 210)" opacity="0.95">
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#1e293b" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>
    <ellipse cx="56" cy="4" rx="22" ry="28" fill="#1e293b" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>
    <path d="M22 8 Q38 24 56 8" fill="none" stroke="rgba(148,163,184,0.35)" stroke-width="2"/>
  </g>
  <!-- Smartwatch -->
  <g transform="translate(1000 95)">
    <rect x="-28" y="-34" width="56" height="68" rx="14" fill="#0f172a" stroke="rgba(212,175,55,0.3)" stroke-width="1.2"/>
    <rect x="-22" y="-26" width="44" height="52" rx="8" fill="#1e293b"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="2"/>
  </g>
  <!-- Smartphone (main) -->
  <g transform="translate(1220 48)" filter="url(#glow)">
    <rect x="-118" y="-8" width="236" height="368" rx="28" fill="#0c1118" stroke="rgba(212,175,55,0.45)" stroke-width="2"/>
    <rect x="-104" y="12" width="208" height="328" rx="18" fill="url(#screen)"/>
    <rect x="-36" y="22" width="72" height="8" rx="4" fill="#0b0f14"/>
    <!-- Subtle UI lines on screen -->
    <rect x="-88" y="52" width="176" height="6" rx="2" fill="#334155" opacity="0.6"/>
    <rect x="-88" y="68" width="132" height="6" rx="2" fill="#1e293b"/>
    <rect x="-88" y="88" width="160" height="72" rx="10" fill="rgba(212,175,55,0.08)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
    <rect x="-88" y="176" width="176" height="8" rx="2" fill="#334155" opacity="0.4"/>
    <rect x="-88" y="194" width="100" height="8" rx="2" fill="#1e293b"/>
    <rect x="-88" y="214" width="176" height="8" rx="2" fill="#1e293b"/>
    <circle cx="0" cy="312" r="10" fill="#1e293b" stroke="rgba(148,163,184,0.25)" stroke-width="1"/>
  </g>
</svg>
